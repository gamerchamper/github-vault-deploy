<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>GitHub Vault Sync</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text2: #aaa;
    --green: #4ecca3;
    --yellow: #f0c040;
    --red: #e94560;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }
  header {
    padding: 12px 20px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  nav { display: flex; gap: 4px; }
  nav button {
    background: transparent;
    border: none;
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  nav button.active { background: var(--surface2); color: var(--text); }
  main { flex: 1; overflow-y: auto; padding: 20px; }
  .tab { display: none; }
  .tab.active { display: block; }
  .status-bar {
    padding: 8px 20px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text2);
  }
  .status-dot.synced { background: var(--green); }
  .status-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.error, .status-dot.offline { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .card {
    background: var(--surface);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card h3 { font-size: 13px; margin-bottom: 8px; color: var(--text2); }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .form-group input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.1);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.04); }
  th { color: var(--text2); font-weight: 500; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-synced { background: rgba(78,204,163,.15); color: var(--green); }
  .badge-uploading { background: rgba(240,192,64,.15); color: var(--yellow); }
  .badge-error { background: rgba(233,69,96,.15); color: var(--red); }
  .badge-pending { background: rgba(170,170,170,.1); color: var(--text2); }
  .log-entry {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 11px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,.02);
  }
  .log-entry.warn { color: var(--yellow); }
  .log-entry.error { color: var(--red); }
  .flex-row { display: flex; gap: 8px; align-items: center; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
  .stat { text-align: center; padding: 12px; background: var(--surface2); border-radius: 6px; }
  .stat-value { font-size: 24px; font-weight: 600; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>GitHub Vault Sync</h1>
    <nav>
      <button onclick="switchTab('status')" class="active" data-tab="status">Status</button>
      <button onclick="switchTab('queue')" data-tab="queue">Queue</button>
      <button onclick="switchTab('settings')" data-tab="settings">Settings</button>
      <button onclick="switchTab('logs')" data-tab="logs">Logs</button>
    </nav>
  </header>
  <main>
    <div id="tab-status" class="tab active">
      <div class="stats-grid">
        <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Files</div></div>
        <div class="stat"><div class="stat-value" id="stat-synced">0</div><div class="stat-label">Synced</div></div>
        <div class="stat"><div class="stat-value" id="stat-uploading">0</div><div class="stat-label">Pending Uploads</div></div>
        <div class="stat"><div class="stat-value" id="stat-conflicts">0</div><div class="stat-label">Conflicts</div></div>
      </div>
      <div class="card" style="margin-top:12px">
        <h3>Sync Folder</h3>
        <div class="flex-row">
          <span id="sync-folder-path" style="flex:1;font-size:12px;color:var(--text2)">Not configured</span>
          <button class="btn btn-sm btn-secondary" onclick="openSyncFolder()">Open</button>
        </div>
      </div>
      <div class="card">
        <h3>Server Connection</h3>
        <span id="server-url-display" style="font-size:12px;color:var(--text2)">Not connected</span>
      </div>
    </div>
    <div id="tab-queue" class="tab">
      <div class="card">
        <h3>Upload Queue</h3>
        <table id="queue-table"><thead><tr><th>File</th><th>Status</th><th>Progress</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
    <div id="tab-settings" class="tab">
      <div class="card">
        <h3>Account</h3>
        <div class="form-group">
          <label>Server URL</label>
          <input id="input-server-url" type="text" placeholder="https://vault.example.com">
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input id="input-api-key" type="password" placeholder="gv_...">
        </div>
        <div class="flex-row">
          <button class="btn btn-primary" onclick="saveServerSettings()">Save & Connect</button>
          <button class="btn btn-secondary" onclick="testConnection()">Test Connection</button>
          <span id="conn-status" style="font-size:12px"></span>
        </div>
      </div>
      <div class="card">
        <h3>Sync Folder</h3>
        <div class="form-group">
          <label>Local Path</label>
          <input id="input-sync-root" type="text" readonly placeholder="Click Browse...">
        </div>
        <button class="btn btn-secondary" onclick="browseSyncFolder()">Browse...</button>
      </div>
    </div>
    <div id="tab-logs" class="tab">
      <div class="card">
        <h3>Recent Activity</h3>
        <div id="log-container" style="max-height: 400px; overflow-y: auto;"></div>
      </div>
    </div>
  </main>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Initializing...</span>
    <span style="margin-left:auto;font-size:11px;color:var(--text2)" id="last-sync"></span>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
