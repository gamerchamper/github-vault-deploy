services:
  vault:
    build: .
    container_name: github-vault
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - vault-data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vault-data:
