  <script data-cfasync="false">
    (function prefetchShareApi() {
      const parts = location.pathname.split('/').filter(Boolean);
      const i = parts.indexOf('share');
      if (i < 0) return;
      const seg = parts[i + 1];
      let token = null;
      let playlist = false;
      if (seg === 'p') {
        playlist = true;
        token = parts[i + 2];
      } else if (seg === 'c') {
        token = parts[i + 2];
      } else if (seg && seg !== 'embed') {
        token = seg;
      }
      if (!token) return;
      const file = new URLSearchParams(location.search).get('file');
      let url;
      if (playlist) {
        url = '/api/public/playlist/' + encodeURIComponent(token);
      } else {
        url = '/api/public/share/' + encodeURIComponent(token) + '/info';
        if (file) url += '?file=' + encodeURIComponent(file);
      }
      window.__shareBootPrefetch = fetch(url, { credentials: 'same-origin' });
    })();
  </script>

  <script data-cfasync="false">
    function parseShareRoute() {
      const pathParts = location.pathname.split('/').filter(Boolean);
      const shareIdx = pathParts.indexOf('share');
      let token = null;
      let isPlaylistShare = false;
      if (shareIdx >= 0) {
        const seg = pathParts[shareIdx + 1];
        if (seg === 'p') {
          isPlaylistShare = true;
          token = pathParts[shareIdx + 2];
        } else if (seg === 'c') {
          token = pathParts[shareIdx + 2];
        } else {
          token = seg;
        }
      } else {
        token = pathParts[0];
      }
      if (token === 'embed') {
        token = isPlaylistShare ? pathParts[shareIdx + 2] : pathParts[shareIdx + 1];
      }
      return { token, isPlaylistShare };
    }

    const route = parseShareRoute();
    const token = route.token;
    const isPlaylistShare = route.isPlaylistShare || !!window.SHARE_PLAYLIST_MODE;
    const isEmbedPath = location.pathname.split('/').filter(Boolean).pop() === 'embed';
    const embedMode = isEmbedPath || window.SHARE_EMBED_MODE || new URLSearchParams(location.search).get('embed') === '1';
    const initialFileId = new URLSearchParams(location.search).get('file');
    const state = { isFolderShare: false, isPlaylistShare, currentPath: null, rootPath: null, folderName: null, clientStream: false };

    function shareApiBase(tok = token) {
      return state.isPlaylistShare ? `/api/public/playlist/${tok}` : `/api/public/share/${tok}`;
    }

    function setPlaylistShareMode() {
      ShareViewer.playlistMode = true;
      ShareClientStream.playlistMode = true;
      ShareShoutbox.playlistMode = true;
      DownloadManager.playlistMode = true;
    }

    let shareCurrentFile = null;

    function isShareMedia(info) {
      if (!info?.name) return false;
      const ext = info.name.split('.').pop().toLowerCase();
      const mime = info.mime_type || '';
      if (mime.startsWith('video/') || mime.startsWith('audio/')) return true;
      return ['mp4', 'webm', 'mkv', 'mov', 'm4v', 'avi', 'mp3', 'wav', 'ogg', 'm4a', 'flac', 'aac'].includes(ext);
    }

    function shareStreamModeLabel(info) {
      if (info?.offline) return 'offline copy in your browser';
      return state.clientStream ? 'decrypted in your browser' : 'streamed via server';
    }

    function hideShareTopDock() {
      document.getElementById('share-top-dock')?.classList.add('hidden');
      document.body.classList.remove('share-has-top-dock', 'share-media-header-mode');
    }

    function renderShareTopDock(info) {
      const dock = document.getElementById('share-top-dock');
      if (!dock || !info || info.is_folder) {
        hideShareTopDock();
        return;
      }
      const isMedia = isShareMedia(info);
      dock.classList.remove('hidden');
      document.body.classList.add('share-has-top-dock');
      document.body.classList.toggle('share-media-header-mode', isMedia);

      document.getElementById('share-owner-name').textContent = info.shared_by || 'Vault user';
      document.getElementById('share-top-filename').textContent = info.name || 'Shared file';
      const avatar = document.getElementById('share-owner-avatar');
      const fallback = document.getElementById('share-owner-fallback');
      if (info.shared_by_avatar) {
        avatar.src = info.shared_by_avatar;
        avatar.alt = info.shared_by || 'Uploader';
        avatar.classList.remove('hidden');
        fallback.classList.add('hidden');
      } else {
        avatar.classList.add('hidden');
        avatar.removeAttribute('src');
        fallback.classList.remove('hidden');
        fallback.textContent = (info.shared_by || 'V').charAt(0).toUpperCase();
      }

      const topMeta = document.getElementById('share-top-dock-meta');
      const topActions = document.getElementById('share-top-dock-actions');
      const extra = document.getElementById('share-top-dock-extra');
      const dockMeta = document.getElementById('share-meta');
      const dockHead = document.querySelector('.share-dock-head');

      topActions?.classList.remove('hidden');

      if (isMedia) {
        topMeta?.classList.remove('hidden');
        dockMeta?.classList.add('hidden');
        dockHead?.classList.add('hidden');

        const pills = [];
        if (info.size) pills.push(formatSize(info.size));
        if (info.chunk_count != null) pills.push(`${info.chunk_count} chunks`);
        if (topMeta) {
          topMeta.innerHTML = pills.map((p) => `<span class="share-top-dock-pill">${escapeHtml(p)}</span>`).join('');
        }
        if (extra) {
          const parts = [];
          if (info.shared_at) {
            const date = new Date(info.shared_at);
            if (!Number.isNaN(date.getTime())) parts.push(date.toLocaleDateString());
          }
          extra.innerHTML = parts.map((p) => `<span class="share-top-dock-pill">${escapeHtml(p)}</span>`).join('');
        }
      } else {
        topMeta?.classList.add('hidden');
        dockMeta?.classList.remove('hidden');
        dockHead?.classList.remove('hidden');

        if (extra) {
          const parts = [];
          if (info.size) parts.push(formatSize(info.size));
          if (info.shared_at) {
            const date = new Date(info.shared_at);
            if (!Number.isNaN(date.getTime())) parts.push(date.toLocaleDateString());
          }
          extra.innerHTML = parts.map((p) => `<span class="share-top-dock-pill">${escapeHtml(p)}</span>`).join('');
        }
      }
    }

    async function fetchShareFileInfo(fileId) {
      const res = await fetch(`/api/public/share/${token}/info?file=${encodeURIComponent(fileId)}`);
      if (!res.ok) return null;
      return res.json();
    }

    function updateShareMeta(fileOrInfo) {
      const isMedia = isShareMedia(fileOrInfo);
      const meta = document.getElementById('share-meta');
      const dockTitle = document.getElementById('share-dock-title');

      if (isMedia) {
        renderShareTopDock(fileOrInfo);
        if (meta) {
          meta.innerHTML = '';
          meta.classList.add('hidden');
        }
        if (dockTitle) dockTitle.textContent = '';
      } else {
        const mode = shareStreamModeLabel(fileOrInfo);
        if (meta) {
          meta.classList.remove('hidden');
          meta.innerHTML = `
            <span class="share-meta-pill">${formatSize(fileOrInfo.size)}</span>
            <span class="share-meta-pill">${fileOrInfo.chunk_count || 0} chunks</span>
            <span class="share-meta-pill">${mode}</span>
          `;
        }
        if (dockTitle) dockTitle.textContent = fileOrInfo.name || '';
      }
    }

    function showError(message) {
      hideShareTopDock();
      document.getElementById('share-loading').classList.add('hidden');
      document.getElementById('share-folder-view').classList.add('hidden');
      document.getElementById('share-file-view').classList.add('hidden');
      document.getElementById('share-error').textContent = message;
      document.getElementById('share-error').classList.remove('hidden');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fileItemHtml(file) {
      const thumbSrc = file.has_thumbnail
        ? `/api/public/share/${token}/thumbnail?file=${encodeURIComponent(file.id)}`
        : '';
      const iconHtml = file.has_thumbnail
        ? `<img class="file-thumb" src="${thumbSrc}" alt="" loading="lazy">`
        : `<div class="file-icon">${getFileIcon(file.name, file.is_folder)}</div>`;
      const sizeHtml = !file.is_folder ? `<div class="file-size">${formatSize(file.size)}</div>` : '';
      return `${iconHtml}<div class="file-name">${escapeHtml(file.name)}</div>${sizeHtml}`;
    }

    function renderBreadcrumb() {
      const nav = document.getElementById('share-breadcrumb');
      if (!state.rootPath || state.currentPath === state.rootPath) {
        nav.classList.add('hidden');
        return;
      }

      const parts = state.currentPath.slice(state.rootPath.length).split('/').filter(Boolean);
      let path = state.rootPath;
      const crumbs = [`<button type="button" data-path="${escapeHtml(state.rootPath)}">${escapeHtml(state.folderName)}</button>`];

      for (const part of parts) {
        path = `${path}/${part}`;
        crumbs.push('<span>/</span>');
        if (path === state.currentPath) {
          crumbs.push(`<span class="current">${escapeHtml(part)}</span>`);
        } else {
          crumbs.push(`<button type="button" data-path="${escapeHtml(path)}">${escapeHtml(part)}</button>`);
        }
      }

      nav.innerHTML = crumbs.join('');
      nav.classList.remove('hidden');
      nav.querySelectorAll('button[data-path]').forEach((btn) => {
        btn.onclick = () => loadFolder(btn.dataset.path);
      });
    }

    async function loadFolder(path = null) {
      await ShareLazyLibs.loadExplorerCss().catch(() => {});
      const query = path ? `?path=${encodeURIComponent(path)}` : '';
      const res = await fetch(`/api/public/share/${token}/list${query}`);
      if (!res.ok) throw new Error('Share link not found or expired');
      const data = await res.json();

      state.currentPath = data.path;
      state.rootPath = data.root_path;

      document.getElementById('share-loading').classList.add('hidden');
      document.getElementById('share-file-view').classList.add('hidden');
      document.getElementById('share-folder-view').classList.remove('hidden');
      document.getElementById('share-page').classList.add('is-folder');
      hideShareTopDock();
      ShareShoutbox.destroy();

      const folderLabel = path === state.rootPath || !path ? state.folderName : data.path.split('/').pop();
      document.getElementById('share-folder-name').textContent = folderLabel;
      document.getElementById('share-folder-meta').textContent = `${data.files.length} item${data.files.length === 1 ? '' : 's'}`;

      renderBreadcrumb();

      const grid = document.getElementById('share-folder-grid');
      if (!data.files.length) {
        grid.innerHTML = '<p class="share-no-preview share-folder-empty-msg">This folder is empty.</p>';
        return;
      }

      grid.innerHTML = data.files.map((file) => `
        <div class="file-item file-item-settled" data-id="${escapeHtml(file.id)}" data-folder="${file.is_folder ? '1' : '0'}">
          ${fileItemHtml(file)}
        </div>
      `).join('');

      grid.querySelectorAll('.file-item').forEach((el) => {
        const file = data.files.find((f) => f.id === el.dataset.id);
        el.onclick = () => openSharedItem(file);
      });
    }

    async function openSharedItem(file) {
      if (file.is_folder) {
        loadFolder(file.path).catch((err) => showError(err.message));
        return;
      }

      document.getElementById('share-folder-view').classList.add('hidden');
      document.getElementById('share-file-view').classList.remove('hidden');
      document.getElementById('share-page').classList.remove('is-folder');
      document.getElementById('share-back').classList.remove('hidden');
      document.getElementById('share-name').textContent = file.name;
      updateShareMeta(file);

      const fileInfo = await fetchShareFileInfo(file.id);
      if (fileInfo) renderShareTopDock(fileInfo);

      const info = {
        ...(fileInfo || file),
        client_stream: state.clientStream,
        hls_available: !!(fileInfo?.hls_available ?? file.has_hls),
      };

      if (info.hls_available) {
        fetch(`${shareApiBase()}/manifest?file=${encodeURIComponent(file.id)}`)
          .then((r) => r.ok ? r.json() : null)
          .then((manifest) => {
            if (manifest?.hls_playlist_url) info.hls_playlist_url = manifest.hls_playlist_url;
            if (manifest?.hls_segment_count != null) info.hls_segment_count = manifest.hls_segment_count;
            if (manifest?.hls_duration_sec != null) info.hls_duration_sec = manifest.hls_duration_sec;
            shareCurrentFile = info;
            ShareViewer.mount(info, token);
            ShareShoutbox.init(token, info.id);
            document.getElementById('share-dl-hls').classList.remove('hidden');
            document.getElementById('share-dl-hls-github').classList.remove('hidden');
          })
          .catch(() => {
            shareCurrentFile = info;
            ShareViewer.mount(info, token);
            ShareShoutbox.init(token, info.id);
            document.getElementById('share-dl-hls').classList.remove('hidden');
            document.getElementById('share-dl-hls-github').classList.remove('hidden');
          });
      } else {
        shareCurrentFile = info;
        ShareViewer.mount(info, token);
        ShareShoutbox.init(token, info.id);
      }
    }

    function showFileShare(info) {
      document.getElementById('share-loading').classList.add('hidden');
      document.getElementById('share-folder-view').classList.add('hidden');
      document.getElementById('share-file-view').classList.remove('hidden');
      document.getElementById('share-name').textContent = info.name;
      renderShareTopDock(info);
      updateShareMeta(info);
      shareCurrentFile = info;
      ShareViewer.mount(info, token);
      if (state.isPlaylistShare && ShareShoutbox.token === token) {
        ShareShoutbox.updateFile(info.id);
      } else {
        ShareShoutbox.init(token, info.id);
      }

      if (info.hls_available) {
        fetch(`${shareApiBase()}/manifest?file=${encodeURIComponent(info.id)}`)
          .then((r) => r.ok ? r.json() : null)
          .then((manifest) => {
            if (manifest?.hls_playlist_url) info.hls_playlist_url = manifest.hls_playlist_url;
            if (manifest?.hls_segment_count != null) info.hls_segment_count = manifest.hls_segment_count;
            if (manifest?.hls_duration_sec != null) info.hls_duration_sec = manifest.hls_duration_sec;
            document.getElementById('share-dl-hls').classList.remove('hidden');
            document.getElementById('share-dl-hls-github').classList.remove('hidden');
            ShareViewer.mergeFileMeta(info);
          })
          .catch(() => {
            document.getElementById('share-dl-hls').classList.remove('hidden');
            document.getElementById('share-dl-hls-github').classList.remove('hidden');
          });
      }
    }

    function applyEmbedMode() {
      if (!embedMode) return;
      document.body.classList.add('share-embed-mode');
    }

    function updateShareFileUrl(fileId) {
      const url = new URL(location.href);
      if (fileId) url.searchParams.set('file', fileId);
      else url.searchParams.delete('file');
      history.replaceState(null, '', url.pathname + url.search);
    }

    async function fetchPlaylistFileInfo(fileId) {
      const res = await fetch(`${shareApiBase()}/info?file=${encodeURIComponent(fileId)}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Not found' }));
        throw new Error(err.error || 'File not found');
      }
      const info = await res.json();
      try {
        const manifestRes = await fetch(`${shareApiBase()}/manifest?file=${encodeURIComponent(fileId)}`);
        if (manifestRes.ok) {
          const manifest = await manifestRes.json();
          if (manifest.hls_playlist_url) info.hls_playlist_url = manifest.hls_playlist_url;
          if (manifest.hls_segment_count != null) info.hls_segment_count = manifest.hls_segment_count;
        }
      } catch { /* optional */ }
      return info;
    }

    async function fetchShareInfo() {
      const infoQs = initialFileId ? `?file=${encodeURIComponent(initialFileId)}` : '';
      const cacheKey = ShareMediaCache.cacheKey(token, initialFileId);

      try {
        if (state.isPlaylistShare && !initialFileId) {
          return null;
        }
        const res = window.__shareBootPrefetch
          ? await window.__shareBootPrefetch
          : await fetch(`${shareApiBase()}/info${infoQs}`);
        window.__shareBootPrefetch = null;
        if (res.ok) {
          const info = await res.json();
          try {
            const manifestRes = await fetch(`${shareApiBase()}/manifest${infoQs}`);
            if (manifestRes.ok) {
              const manifest = await manifestRes.json();
              if (manifest.hls_playlist_url) info.hls_playlist_url = manifest.hls_playlist_url;
              if (manifest.hls_segment_count != null) info.hls_segment_count = manifest.hls_segment_count;
              await ShareMediaCache.putManifest(cacheKey, {
                manifest,
                info,
                token,
                fileId: initialFileId,
              });
            }
          } catch { /* manifest prefetch optional */ }
          return info;
        }
      } catch { /* server unreachable */ }

      const entry = await ShareMediaCache.getManifest(cacheKey);
      if (entry?.info) return { ...entry.info, offline: true, client_stream: true };
      if (entry?.manifest) {
        return ShareMediaCache.infoFromManifest(entry.manifest, {
          has_thumbnail: entry.info?.has_thumbnail,
        });
      }

      throw new Error('Share unavailable offline — open this link once while the server is online');
    }

    async function initPlaylistShare() {
      setPlaylistShareMode();
      if (!document.getElementById('share-playlists-css')) {
        await ShareLazyLibs.loadPlaylistsCss().catch(() => {});
      }
      document.getElementById('share-hero')?.classList.add('hidden');
      SharePlaylist.init(token, async (fileId) => {
        updateShareFileUrl(fileId);
        const info = await fetchPlaylistFileInfo(fileId);
        state.clientStream = !!info.client_stream;
        showFileShare(info);
        SharePlaylist.render();
      });
      await SharePlaylist.load();
    }

    async function init() {
      applyEmbedMode();
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
      if (ShareLazyLibs.needsStreamLog()) {
        ShareLazyLibs.loadStreamLog().catch(() => {});
      }
      const registerSw = () => {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.register('/share/sw.js', { scope: '/share/' })
          .then((reg) => reg.update())
          .catch(() => {});
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(registerSw, { timeout: 8000 });
      } else {
        window.addEventListener('load', registerSw, { once: true });
      }
      try {
        if (state.isPlaylistShare) {
          await initPlaylistShare();
          return;
        }

        const info = await fetchShareInfo();

        if (!embedMode && !info.offline) {
          SharePresence.join(token).catch(() => {});
        }

        state.clientStream = info.offline ? true : !!info.client_stream;

        if (info.is_folder && !initialFileId) {
          state.isFolderShare = true;
          state.folderName = info.name;
          await loadFolder();
          return;
        }

        if (info.is_folder && initialFileId) {
          state.isFolderShare = true;
          state.folderName = info.parent_folder || info.name;
        }

        showFileShare(info);
      } catch (err) {
        showError(err.message);
      }
    }

    function bindShareUi() {
      document.getElementById('share-back').addEventListener('click', () => {
        hideShareTopDock();
        ShareViewer.destroy();
        ShareShoutbox.destroy();
        shareCurrentFile = null;
        document.getElementById('share-file-view').classList.add('hidden');
        document.getElementById('share-back').classList.add('hidden');
        document.getElementById('share-error').classList.add('hidden');
        loadFolder(state.currentPath).catch((err) => showError(err.message));
      });

      document.getElementById('share-download').addEventListener('click', () => {
        if (!shareCurrentFile) return;
        DownloadManager.downloadFile(shareCurrentFile, { token });
      });

      document.getElementById('share-dl-hls').addEventListener('click', () => {
        if (!shareCurrentFile) return;
        const baseName = (shareCurrentFile.name || 'media').replace(/\.[^.]+$/, '');
        const hlsUrl = shareCurrentFile.hls_playlist_url
          ? `${shareApiBase()}/hls?file=${shareCurrentFile.id}`
          : `${shareApiBase()}/hls/playlist.m3u8?file=${shareCurrentFile.id}`;
        const a = document.createElement('a');
        a.href = hlsUrl;
        a.download = baseName + '.m3u8';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
      document.getElementById('share-dl-hls-github').addEventListener('click', () => {
        if (!shareCurrentFile?.hls_playlist_url) return;
        window.open(shareCurrentFile.hls_playlist_url, '_blank');
      });

      DownloadManager.bindEvents();

      window.addEventListener('pagehide', () => {
        ShareViewer.destroy({ useBeacon: true });
      });
    }

    function bootSharePage() {
      if (typeof DownloadManager === 'undefined' || typeof ShareViewer === 'undefined') {
        showError('Page scripts failed to load — try a hard refresh or disable Cloudflare Rocket Loader for this site');
        return;
      }
      bindShareUi();
      init();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootSharePage);
    } else {
      bootSharePage();
    }
  </script>
</body>
</html>
